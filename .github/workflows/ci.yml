name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - LICENSE
  # Lets the release pipeline run the full CI gate before publishing.
  workflow_call:

# Force-pushes supersede the running build; PRs always get a full run regardless.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (stable, ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The npm package and the cargo workspace release in lockstep (`just bump <version>`);
      # catch drift here instead of at publish time.
      - name: Check the npm and cargo versions agree
        run: |
          npm_version="$(jq -r .version crates/sim-node/package.json)"
          cargo_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          if [ "$npm_version" != "$cargo_version" ]; then
            echo "Version drift: package.json=$npm_version Cargo.toml=$cargo_version" >&2
            exit 1
          fi

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test (includes the tick-exact golden-trace corpus)
        run: cargo test --workspace

      - name: Build CLI (release)
        run: cargo build -p sim-cli --release

      - name: Bench smoke (short, asserts the engine runs — not a perf gate)
        run: ./target/release/sim bench corpus/boards/clk.json --ticks 200000 --repeat 3

  wasm:
    name: wasm (wasm-pack, node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain (+ wasm32)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest

      # Drive the golden corpus through the WASM binding and diff vs the C++ oracle.
      - name: Cross-engine equivalence (corpus → wasm)
        run: wasm-pack test --node crates/sim-wasm

      - name: Build the release wasm package (SIMD128)
        run: |
          RUSTFLAGS="-C target-feature=+simd128" \
            wasm-pack build crates/sim-wasm --release --target web --scope logigator -- --no-default-features --features serde

  node:
    name: node (napi-rs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/sim-node/package-lock.json

      - name: Install addon deps (@napi-rs/cli)
        run: npm ci
        working-directory: crates/sim-node

      - name: Build the Node addon (ESM binding)
        run: npx napi build --platform --esm
        working-directory: crates/sim-node

      # Drive the golden corpus through the Node binding and diff vs the C++ oracle, plus the
      # async-surface / liveness tests.
      - name: Cross-engine equivalence (corpus → node)
        run: node --test __test__/*.mjs
        working-directory: crates/sim-node

  msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Install the exact MSRV floor; the explicit `cargo +1.85.0` below overrides the `stable`
      # pinned in rust-toolchain.toml (a `+toolchain` arg outranks the toolchain file).
      - name: Install MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"

      - uses: Swatinem/rust-cache@v2

      # MSRV 1.85 is the engine's floor. sim-wasm's floor is set by the wasm-bindgen
      # toolchain, not us, so it's covered by the `wasm` job rather than the MSRV gate.
      - name: Check on MSRV
        run: cargo +1.85.0 check -p sim-core -p sim-cli --all-targets
