[workspace]
resolver = "2"
members = ["crates/sim-core"]
# CLI / WASM / Node / xtask crates are added in their respective phases (plan §11).

[workspace.package]
edition = "2024"
rust-version = "1.85"   # edition 2024 floor (plan §3); MSRV enforced by CI
license = "MIT"
repository = "https://github.com/logigator/logigator-sim"

[workspace.dependencies]
sim-core   = { path = "crates/sim-core" }
thiserror  = "2"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
